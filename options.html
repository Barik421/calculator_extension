<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator Settings</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main class="options-shell">
      <section class="options-card">
        <div class="toolbar">
          <button class="icon-button" id="backButton" type="button" data-i18n-aria="backToCalculator" aria-label="Back to calculator">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M14.7 5.3a1 1 0 0 1 0 1.4L10.41 11H20a1 1 0 1 1 0 2h-9.59l4.3 4.3a1 1 0 1 1-1.42 1.4l-6-6a1 1 0 0 1 0-1.4l6-6a1 1 0 0 1 1.4 0Z"/>
            </svg>
          </button>
        </div>
        <h1 class="settings-title" data-i18n="optionsTitle">Calculator settings</h1>

        <form id="settingsForm" class="settings-form">
          <label class="field">
            <span data-i18n="language">Language</span>
            <select id="language">
              <option value="en" data-i18n="languageEnglish">English</option>
              <option value="uk" data-i18n="languageUkrainian">Ukrainian</option>
            </select>
          </label>

          <label class="field checkbox-row">
            <input id="historyEnabled" type="checkbox">
            <span data-i18n="historyEnabledLabel">Enable history</span>
          </label>

          <label class="field">
            <span data-i18n="historyLimit">Recent calculations to keep</span>
            <select id="historyLimit">
              <option value="5">5</option>
              <option value="10">10</option>
              <option value="20">20</option>
            </select>
          </label>
        </form>

        <p class="status" id="saveStatus" aria-live="polite"></p>
      </section>
    </main>
    <script src="shared.js"></script>
    <script src="options.js"></script>
  </body>
</html>
