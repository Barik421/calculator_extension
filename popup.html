<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body data-view="popup">
    <main class="app-shell">
      <section class="calculator-card">
        <header class="topbar">
          <div>
            <p class="eyebrow" data-i18n="appTitle">BRNV Calculator</p>
            <h1 class="screen-expression" id="expression">0</h1>
          </div>
          <button class="icon-button" id="openOptions" type="button" data-i18n-aria="settings" aria-label="Settings">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M10.3 2.9h3.4l.5 2.2c.5.2 1 .4 1.4.8l2.1-.7 1.7 2.9-1.7 1.4c.1.5.1 1 .1 1.5s0 1-.1 1.5l1.7 1.4-1.7 2.9-2.1-.7c-.4.3-.9.6-1.4.8l-.5 2.2h-3.4l-.5-2.2c-.5-.2-1-.4-1.4-.8l-2.1.7-1.7-2.9 1.7-1.4a7 7 0 0 1 0-3l-1.7-1.4 1.7-2.9 2.1.7c.4-.3.9-.6 1.4-.8l.5-2.2Z"/>
              <circle cx="12" cy="12" r="3.1"/>
            </svg>
          </button>
        </header>

        <div class="screen" id="display" aria-live="polite">0</div>

        <section class="function-row" aria-label="Calculator utilities">
          <button class="calc-btn utility utility-pill" data-action="clear" data-i18n="ac">AC</button>
          <button class="calc-btn utility utility-pill" data-action="delete" data-i18n="delete">DEL</button>
          <button class="calc-btn utility utility-pill" data-action="paren" data-value="(" data-i18n="openBracket">(</button>
          <button class="calc-btn utility utility-pill" data-action="paren" data-value=")" data-i18n="closeBracket">)</button>
        </section>

        <section class="keypad-layout" aria-label="Calculator keypad">
          <section class="number-grid">
            <button class="calc-btn" data-action="digit" data-value="7">7</button>
            <button class="calc-btn" data-action="digit" data-value="8">8</button>
            <button class="calc-btn" data-action="digit" data-value="9">9</button>

            <button class="calc-btn" data-action="digit" data-value="4">4</button>
            <button class="calc-btn" data-action="digit" data-value="5">5</button>
            <button class="calc-btn" data-action="digit" data-value="6">6</button>

            <button class="calc-btn" data-action="digit" data-value="1">1</button>
            <button class="calc-btn" data-action="digit" data-value="2">2</button>
            <button class="calc-btn" data-action="digit" data-value="3">3</button>

            <button class="calc-btn wide" data-action="digit" data-value="0">0</button>
            <button class="calc-btn" data-action="decimal" data-i18n="decimal">.</button>
          </section>

          <section class="operator-stack">
            <button class="calc-btn accent" data-action="percent" data-i18n="percent">%</button>
            <button class="calc-btn accent" data-action="operator" data-value="/" data-i18n="divide">÷</button>
            <button class="calc-btn accent" data-action="operator" data-value="*" data-i18n="multiply">×</button>
            <button class="calc-btn accent" data-action="operator" data-value="-" data-i18n="subtract">−</button>
            <button class="calc-btn accent" data-action="operator" data-value="+" data-i18n="add">+</button>
          </section>
        </section>

        <button class="calc-btn accent equals-row" data-action="equals" data-i18n="equals">=</button>

        <section class="history-panel collapsed" id="historyPanel">
          <div class="history-header">
            <button class="text-button history-toggle" id="toggleHistory" data-i18n="history">History</button>
            <button class="text-button danger" id="clearHistory" data-i18n="clearHistory">Clear history</button>
          </div>
          <div class="history-list" id="historyList"></div>
        </section>

        <footer class="footer-actions">
          <button class="link-button" id="openLargeView" data-i18n="openLargeView">Open large view</button>
        </footer>
      </section>
    </main>
    <script src="shared.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
